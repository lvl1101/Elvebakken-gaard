<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="inputbox">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="inputbox">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div class="inputbox">
                    <button type="submit" id="loginBtn">Login</button>
                </div>
                <p id="errorMessage" class="error"></p>
            </form>
        </div>
    </div>

    <script>
        console.log("Hello - JavaScript is working!");
        
        if (typeof window.supabase === 'undefined') {
            console.error('❌ Supabase library not loaded!');
        } else {
            const SUPABASE_URL = 'https://naogkvryaxnbkzspqakn.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hb2drdnJ5YXhuYmt6c3BxYWtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDYyODAsImV4cCI6MjA4ODI4MjI4MH0.IHkpF8GMZD4GPawrI0Se73N18E__P7Ys7BmhT8fr29o';

            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');

            loginForm.addEventListener('submit', async (event) => {
                event.preventDefault();

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                loginBtn.disabled = true;
                loginBtn.textContent = 'Logging in...';
                errorMessage.style.display = 'none';

                try {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password,
                    });

                    if (error) {
                        throw error;
                    }

                    // ✅ Redirect to dashboard after login
                    window.location.href = 'dashboard.html';

                } catch (error) {
                    console.error('Login Error:', error.message);
                    errorMessage.textContent = error.message;
                    errorMessage.style.display = 'block';
                    
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            });
        }
    </script>
</body>
</html>
