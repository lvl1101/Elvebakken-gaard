<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historien til gården</title>
    <link rel="stylesheet" href="Stiler.css">
    <script src="prsojekt.js"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <button class="settings-button" id="settingsBtn">
                <img src="settings-icon.png" alt="Settings" class="settings-icon">
            </button>
            <a href="index.html" class="hjem-knapp" data-translate="hjemKnapp">Hjem</a>
            <a href="dyrene_paa_gaarden.html" class="dyr-knapp" data-translate="dyrKnapp">Dyrene våre</a>
            <a href="historien_til_elvebakk_gård.html" class="historie-knapp" data-translate="historieKnapp">Historien til gården</a>

            <!-- Instillinger m/ meny -->
            <div id="settingsMenu" class="settings-menu" role="menu">
                <!-- Tema -->
                <details>
                    <summary data-translate="themeSummary">Tema</summary>
                    <label>
                        <input type="radio" name="theme" value="light" checked>
                        <span data-translate="themeLight">Lyst tema</span>
                    </label>
                    <label>
                        <input type="radio" name="theme" value="dark">
                        <span data-translate="themeDark">Mørkt tema</span>
                    </label>
                </details>

                <!-- Språk -->
                <details>
                    <summary data-translate="languageSummary">Språk</summary>
                    <label for="language-select" data-translate="chooseLanguage">Velg språk:</label>
                    <select id="language-select">
                        <option value="no" data-translate="langNo">Norsk</option>
                        <option value="en" data-translate="langEn">English</option>
                        <option value="de" data-translate="langDe">Deutsch</option>
                        <option value="es" data-translate="langEs">Español</option>
                    </select>
                </details>
            </div>
        </nav>
    </header>

            storageBucket: "elvebakk-gaard.firebasestorage.app",
            messagingSenderId: "279125591501",
            appId: "1:279125591501:web:44715d7e82ada6c1803084"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
    </script>
</body>
</html>
